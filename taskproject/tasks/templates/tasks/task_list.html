<!DOCTYPE html>
<html lang="en">
<head>
  <title>Task Manager</title>
</head>
<body>
  <a href="{% url 'logout' %}">Logout</a>
  <h1>Task List</h1>
  <a href="{% url 'task_create' %}">Add Task</a>
  <ul>
    {% for task in tasks %}
    <li>
      <strong>{{ task.title }}</strong>
      - {{ task.description }}
      - {{ task.completed }}
      <a href="{% url 'task_update' task.id %}">Edit</a>
      <a href="{% url 'task_delete' task.id %}">Delete</a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
